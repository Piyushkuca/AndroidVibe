name: Build & Release APK

on:
  # Allows you to trigger the build manually from the GitHub UI
  workflow_dispatch: 
  # Automatically triggers when you push a version tag (e.g., v1.0, v2.1)
  push:
    tags:
      - 'v*'

# Required permission to let GitHub Actions create the release
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Uploads to the hidden Artifacts (just in case)
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AndroidVibe-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      # Creates the official GitHub Release and attaches the APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
