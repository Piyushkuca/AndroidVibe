name: Build & Release APK

on:
  # Triggers the build automatically every time you push code
  push:
    branches: [ "main", "master" ]
  # Allows you to click a "Run workflow" button manually
  workflow_dispatch:

# Gives the Action permission to create the release file
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # This creates an always-up-to-date "Latest Build" release on your repo page
      - name: Upload to "Latest Build" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Auto-Build"
          body: "This is the most recent build of AndroidVibe, automatically generated from the latest code."
          prerelease: true
          files: app/build/outputs/apk/debug/app-debug.apk
